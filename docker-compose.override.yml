services:
  webapp:
    environment:
      VITE_NEXA_API_BASE_URL: /api/v1
      VITE_DEV_PROXY_TARGET: http://api:8080

  proxy:
    image: caddy:2-alpine
    container_name: nexa-proxy
    ports:
      - "8000:8000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - webapp
