services:
  api:
    environment:
      ALLOWED_ORIGINS__0: https://predict-badness-crane.ngrok-free.dev

  webapp:
    environment:
      VITE_NEXA_API_BASE_URL: /api/v1

  proxy:
    image: caddy:2-alpine
    container_name: nexa-proxy
    ports:
      - "8000:8000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - api
      - webapp
